name: Check for Updates

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:
    inputs:
      min_age_days:
        description: "Minimum release age in days (0 to skip age check)"
        required: false
        default: "7"

permissions:
  contents: write
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for new versions
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MIN_AGE="${{ inputs.min_age_days || '7' }}"
          OUTPUT=$(bash scripts/check-versions.sh versions.json "$MIN_AGE" 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "updated=true"; then
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push updates
        if: steps.check.outputs.has_updates == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions.json
          git commit -m "chore: update upstream versions

          Automatically detected new versions via check-versions.sh"
          git push

  # Pushes by GITHUB_TOKEN do not trigger other workflows, so chain build.yml
  # explicitly via workflow_call when the check job committed an update.
  build:
    needs: check
    if: needs.check.outputs.has_updates == 'true'
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
      packages: write
    secrets: inherit
