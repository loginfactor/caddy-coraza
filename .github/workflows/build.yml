name: Build and Push

on:
  push:
    branches: [main]
    paths:
      - versions.json
      - Dockerfile
      - .github/workflows/build.yml
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      caddy: ${{ steps.versions.outputs.caddy }}
      coraza: ${{ steps.versions.outputs.coraza }}
      ratelimit: ${{ steps.versions.outputs.ratelimit }}
      go: ${{ steps.versions.outputs.go }}
      xcaddy: ${{ steps.versions.outputs.xcaddy }}
      crs_matrix: ${{ steps.versions.outputs.crs_matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Read versions
        id: versions
        run: |
          echo "caddy=$(jq -r .caddy versions.json)" >> "$GITHUB_OUTPUT"
          echo "coraza=$(jq -r .coraza_caddy versions.json)" >> "$GITHUB_OUTPUT"
          echo "ratelimit=$(jq -r .caddy_ratelimit versions.json)" >> "$GITHUB_OUTPUT"
          echo "go=$(jq -r .go versions.json)" >> "$GITHUB_OUTPUT"
          echo "xcaddy=$(jq -r .xcaddy versions.json)" >> "$GITHUB_OUTPUT"
          # Build matrix from crs_versions map: [{"minor":"4.25","patch":"4.25.0"}, ...]
          echo "crs_matrix=$(jq -c '[.crs_versions | to_entries[] | {minor: .key, patch: .value}]' versions.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        crs: ${{ fromJson(needs.prepare.outputs.crs_matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          CADDY="${{ needs.prepare.outputs.caddy }}"
          CORAZA="${{ needs.prepare.outputs.coraza }}"
          RATELIMIT="${{ needs.prepare.outputs.ratelimit }}"
          CRS_MINOR="${{ matrix.crs.minor }}"
          CRS_PATCH="${{ matrix.crs.patch }}"
          CADDY_MAJOR="${CADDY%%.*}"
          CORAZA_MAJOR="${CORAZA%%.*}"
          CRS_MAJOR="${CRS_MINOR%%.*}"
          IMAGE="ghcr.io/${{ github.repository }}"

          # Ratelimit ref for the immutable tag: full release tag (e.g. 0.2.0),
          # or 7-char SHA when commit-pinned. Detected via the dot test.
          if [[ "$RATELIMIT" == *.* ]]; then
            RATELIMIT_TAG="$RATELIMIT"
          else
            RATELIMIT_TAG="${RATELIMIT:0:7}"
          fi

          TAGS="${IMAGE}:${CADDY}-${CORAZA}-${CRS_PATCH}-${RATELIMIT_TAG}"
          TAGS="${TAGS},${IMAGE}:${CADDY_MAJOR}-${CORAZA_MAJOR}-${CRS_MINOR}"
          TAGS="${TAGS},${IMAGE}:${CADDY_MAJOR}-${CORAZA_MAJOR}-${CRS_MAJOR}"
          TAGS="${TAGS},${IMAGE}:latest"

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "caddy=${CADDY}" >> "$GITHUB_OUTPUT"
          echo "coraza=${CORAZA}" >> "$GITHUB_OUTPUT"
          echo "ratelimit=${RATELIMIT}" >> "$GITHUB_OUTPUT"
          echo "crs_patch=${CRS_PATCH}" >> "$GITHUB_OUTPUT"

      # Build for testing (single platform, load into local docker)
      - name: Build test image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          load: true
          tags: caddy-coraza:test
          build-args: |
            GO_VERSION=${{ needs.prepare.outputs.go }}
            XCADDY_VERSION=${{ needs.prepare.outputs.xcaddy }}
            CADDY_VERSION=${{ steps.meta.outputs.caddy }}
            CORAZA_CADDY_VERSION=${{ steps.meta.outputs.coraza }}
            CADDY_RATELIMIT_VERSION=${{ steps.meta.outputs.ratelimit }}
            CRS_VERSION=${{ steps.meta.outputs.crs_patch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test image
        run: |
          # Start container with test Caddyfile
          docker run --rm -d --name caddy-test \
            -p 8080:8080 \
            -v "${{ github.workspace }}/test/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy-coraza:test

          # Wait for Caddy to start
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080 > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Health check
          echo "=== Health Check ==="
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080)
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: Expected 200, got $STATUS"
            docker logs caddy-test
            exit 1
          fi
          echo "OK: Got 200"

          # WAF test - XSS should be blocked
          echo "=== WAF Test (XSS) ==="
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' 'http://localhost:8080?q=<script>alert(1)</script>')
          if [ "$STATUS" != "403" ]; then
            echo "FAIL: Expected 403, got $STATUS"
            docker logs caddy-test
            exit 1
          fi
          echo "OK: XSS blocked with 403"

          # Rate limit test - zone allows 2 events per minute on /limited*
          echo "=== Rate Limit Test ==="
          S1=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/limited)
          S2=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/limited)
          S3=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/limited)
          if [ "$S1" != "200" ] || [ "$S2" != "200" ]; then
            echo "FAIL: First two requests expected 200, got $S1 $S2"
            docker logs caddy-test
            exit 1
          fi
          if [ "$S3" != "429" ]; then
            echo "FAIL: Third request expected 429, got $S3"
            docker logs caddy-test
            exit 1
          fi
          echo "OK: Rate limit enforced (200, 200, 429)"

          docker stop caddy-test

      # Build and push multi-platform
      - name: Build and push
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GO_VERSION=${{ needs.prepare.outputs.go }}
            XCADDY_VERSION=${{ needs.prepare.outputs.xcaddy }}
            CADDY_VERSION=${{ steps.meta.outputs.caddy }}
            CORAZA_CADDY_VERSION=${{ steps.meta.outputs.coraza }}
            CADDY_RATELIMIT_VERSION=${{ steps.meta.outputs.ratelimit }}
            CRS_VERSION=${{ steps.meta.outputs.crs_patch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
